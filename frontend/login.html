<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AnimaCare Admin · Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#00C896;--g2:#00E5A8;--g3:#80F5D4;--gd:#005A42;
  --pu1:#7B5FFF;--pu2:#9B82FF;--red:#FF4D6D;
  --bg:#030608;--bg2:#060C0F;--bg3:#0A1218;--bg4:#0E1820;
  --t1:#F8F2E0;--t2:rgba(248,242,224,.7);--t3:rgba(248,242,224,.4);--t4:rgba(248,242,224,.2);
  --bd:rgba(0,200,150,.15);
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Roboto',sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Animated background */
body::before{content:'';position:fixed;top:-120px;left:-120px;width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,200,150,.07),transparent 65%);
  border-radius:50%;pointer-events:none;z-index:0;animation:floatOrb 8s ease-in-out infinite}
body::after{content:'';position:fixed;bottom:-100px;right:-100px;width:500px;height:500px;
  background:radial-gradient(circle,rgba(123,95,255,.05),transparent 65%);
  border-radius:50%;pointer-events:none;z-index:0;animation:floatOrb 10s ease-in-out infinite reverse}
@keyframes floatOrb{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}

/* Grid pattern overlay */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,200,150,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,150,.03) 1px,transparent 1px);
  background-size:60px 60px}

/* Card */
.card{
  position:relative;z-index:1;
  background:linear-gradient(165deg,var(--bg2),var(--bg3));
  border:1px solid var(--bd);
  border-radius:24px;
  padding:48px 44px 40px;
  width:440px;
  max-width:calc(100vw - 32px);
  box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 60px rgba(0,200,150,.04);
  backdrop-filter:blur(20px);
}
.card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--g1),transparent);opacity:.4}

/* Logo */
.logo{text-align:center;margin-bottom:36px}
.logo-gem{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(145deg,var(--gd),var(--g1));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  box-shadow:0 12px 32px rgba(0,200,150,.3),0 0 20px rgba(0,200,150,.1);
  position:relative;
}
.logo-gem::after{content:'';position:absolute;inset:-3px;border-radius:18px;
  border:1px solid rgba(0,200,150,.2);pointer-events:none}
.logo-gem svg{width:28px;height:28px;fill:none;stroke:#000;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-size:22px;font-weight:700;letter-spacing:.5px;color:var(--t1)}
.logo-sub{font-size:11px;color:var(--g1);margin-top:6px;font-family:'Roboto Mono',monospace;
  letter-spacing:3px;text-transform:uppercase;font-weight:500}

/* Tab toggle */
.tab-bar{display:flex;gap:4px;margin-bottom:28px;
  background:rgba(0,200,150,.04);border:1px solid rgba(0,200,150,.1);
  border-radius:14px;padding:4px}
.tab{flex:1;padding:10px 16px;border-radius:11px;border:none;
  font-family:'Roboto',sans-serif;font-size:13px;font-weight:600;
  color:var(--t3);cursor:pointer;background:transparent;
  transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.3px}
.tab svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;opacity:.6;transition:opacity .2s}
.tab.active{background:linear-gradient(135deg,var(--gd),rgba(0,200,150,.3));
  color:var(--g2);box-shadow:0 4px 16px rgba(0,200,150,.15)}
.tab.active svg{opacity:1;stroke:var(--g2)}
.tab:not(.active):hover{color:var(--t2);background:rgba(0,200,150,.06)}

/* Form panels */
.panel{display:none}
.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Fields */
.field{margin-bottom:18px}
.field label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3);
  margin-bottom:8px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.field label svg{width:14px;height:14px;fill:none;stroke:var(--g1);stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;opacity:.6}
.input-wrap{position:relative}
.input-wrap svg.input-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;fill:none;stroke:var(--t4);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;pointer-events:none;transition:stroke .2s}
.field input{
  width:100%;
  background:rgba(0,200,150,.04);
  border:1px solid rgba(0,200,150,.12);
  border-radius:12px;
  padding:13px 14px 13px 44px;
  color:var(--t1);
  font-size:15px;
  font-family:'Roboto',sans-serif;
  outline:none;
  transition:all .25s;
}
.field input:focus{border-color:var(--g1);background:rgba(0,200,150,.07);
  box-shadow:0 0 0 3px rgba(0,200,150,.08)}
.field input:focus~svg.input-ico,.field input:focus+svg.input-ico{stroke:var(--g1)}
.field input::placeholder{color:var(--t4);font-weight:300}

/* ID input special style */
.field input.id-input{font-family:'Roboto Mono',monospace;font-size:16px;
  letter-spacing:3px;text-transform:uppercase;font-weight:500}

/* Password toggle */
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:4px;opacity:.4;transition:opacity .2s}
.pw-toggle:hover{opacity:.7}
.pw-toggle svg{width:18px;height:18px;fill:none;stroke:var(--t1);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round}

/* Login button */
.btn-login{
  width:100%;
  background:linear-gradient(135deg,var(--gd),var(--g1));
  color:#000;
  border:none;
  border-radius:12px;
  padding:14px;
  font-size:14px;
  font-weight:700;
  font-family:'Roboto',sans-serif;
  cursor:pointer;
  margin-top:4px;
  transition:all .25s;
  letter-spacing:.5px;
  text-transform:uppercase;
  position:relative;
  overflow:hidden;
}
.btn-login::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transition:left .5s}
.btn-login:hover::before{left:100%}
.btn-login:hover{box-shadow:0 8px 28px rgba(0,200,150,.3);transform:translateY(-1px)}
.btn-login:active{transform:scale(.99);box-shadow:0 4px 16px rgba(0,200,150,.2)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-login:disabled::before{display:none}

/* Error */
.err{
  color:var(--red);font-size:13px;text-align:center;
  margin-top:14px;min-height:0;
  background:rgba(255,77,109,.06);
  border:1px solid rgba(255,77,109,.12);
  border-radius:10px;padding:10px 14px;
  display:none;
  animation:shakeErr .3s ease;
}
.err.show{display:flex;align-items:center;justify-content:center;gap:8px}
.err svg{width:16px;height:16px;fill:none;stroke:var(--red);stroke-width:2;
  stroke-linecap:round;flex-shrink:0}
@keyframes shakeErr{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:24px 0 20px}
.divider::before,.divider::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,200,150,.15),transparent)}
.divider span{font-size:10px;color:var(--t4);letter-spacing:2px;text-transform:uppercase;font-weight:500;white-space:nowrap}

/* Info box */
.info-box{
  background:rgba(0,200,150,.03);border:1px solid rgba(0,200,150,.08);
  border-radius:10px;padding:12px 14px;margin-top:20px;
  display:flex;align-items:flex-start;gap:10px;
}
.info-box svg{width:16px;height:16px;fill:none;stroke:var(--g1);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:1px;opacity:.6}
.info-box p{font-size:12px;color:var(--t3);line-height:1.7}
.info-box code{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--g2);
  background:rgba(0,200,150,.08);padding:1px 6px;border-radius:4px}

/* Footer */
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--t4);line-height:1.8}
.footer a{color:var(--g1);text-decoration:none;transition:color .2s}
.footer a:hover{color:var(--g2)}

/* Loading */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);
  border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Success state */
.btn-login.success{background:linear-gradient(135deg,#00C896,#00E5A8);pointer-events:none}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="card">
  <div class="logo">
    <div class="logo-gem">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-name">AnimaCare Global</div>
    <div class="logo-sub">Admin Platform</div>
  </div>

  <!-- Tab Toggle: Admin ID / Email -->
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('id')" id="tabId">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="11" y2="9"/><line x1="7" y1="13" x2="17" y2="13"/><circle cx="15.5" cy="9" r="1.5"/></svg>
      Admin ID
    </button>
    <button class="tab" onclick="switchTab('email')" id="tabEmail">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></svg>
      Email
    </button>
  </div>

  <!-- Panel: Admin ID Login -->
  <div class="panel active" id="panelId">
    <div class="field">
      <label>
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="15.5" cy="9" r="1.5"/><line x1="7" y1="9" x2="11" y2="9"/></svg>
        Mã Admin / Staff Code
      </label>
      <div class="input-wrap">
        <input id="staffCode" type="text" class="id-input" placeholder="SA001" autocomplete="username" maxlength="20">
        <svg class="input-ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="11" y2="9"/><line x1="7" y1="13" x2="17" y2="13"/></svg>
      </div>
    </div>
    <div class="field">
      <label>
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Mật khẩu
      </label>
      <div class="input-wrap">
        <input id="passId" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
        <svg class="input-ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <button class="pw-toggle" type="button" onclick="togglePw('passId',this)">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-login" id="btnId" onclick="doLoginId()">
      <svg style="width:16px;height:16px;fill:none;stroke:#000;stroke-width:2;stroke-linecap:round;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Đăng nhập bằng ID
    </button>
  </div>

  <!-- Panel: Email Login -->
  <div class="panel" id="panelEmail">
    <div class="field">
      <label>
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></svg>
        Email
      </label>
      <div class="input-wrap">
        <input id="email" type="email" placeholder="admin@animacare.global" autocomplete="email">
        <svg class="input-ico" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></svg>
      </div>
    </div>
    <div class="field">
      <label>
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Mật khẩu
      </label>
      <div class="input-wrap">
        <input id="passEmail" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
        <svg class="input-ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <button class="pw-toggle" type="button" onclick="togglePw('passEmail',this)">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-login" id="btnEmail" onclick="doLoginEmail()">
      <svg style="width:16px;height:16px;fill:none;stroke:#000;stroke-width:2;stroke-linecap:round;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Đăng nhập bằng Email
    </button>
  </div>

  <!-- Error display -->
  <div class="err" id="err">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errMsg"></span>
  </div>

  <!-- Info -->
  <div class="info-box">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <p>Đăng nhập bằng <code>Admin ID</code> (ví dụ: <code>SA001</code>) hoặc <code>Email</code> kèm mật khẩu. Liên hệ quản trị viên nếu quên thông tin.</p>
  </div>

  <div class="footer">
    AnimaCare Global Pte. Ltd. · Singapore<br>
    <a href="mailto:info@animacare.global">info@animacare.global</a>
  </div>
</div>

<script>window.API_BASE = '/api/v1';</script>
<script src="api-client.js"></script>
<script>
// Check if already logged in
(function(){
  const t = localStorage.getItem('ac_token');
  if(t) window.location.href = 'admin.html';
})();

// ── Tab switching ──
function switchTab(mode){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  clearErr();

  if(mode === 'id'){
    document.getElementById('tabId').classList.add('active');
    document.getElementById('panelId').classList.add('active');
    setTimeout(() => document.getElementById('staffCode').focus(), 100);
  } else {
    document.getElementById('tabEmail').classList.add('active');
    document.getElementById('panelEmail').classList.add('active');
    setTimeout(() => document.getElementById('email').focus(), 100);
  }
}

// ── Password visibility toggle ──
function togglePw(inputId, btn){
  const input = document.getElementById(inputId);
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  btn.innerHTML = isPassword
    ? '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/><path d="M14.12 14.12a3 3 0 11-4.24-4.24"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

// ── Enter key handlers ──
document.getElementById('staffCode').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('passId').focus();
});
document.getElementById('passId').addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLoginId();
});
document.getElementById('email').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('passEmail').focus();
});
document.getElementById('passEmail').addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLoginEmail();
});

// ── Login by Admin ID ──
async function doLoginId(){
  const btn = document.getElementById('btnId');
  const code = document.getElementById('staffCode').value.trim();
  const pass = document.getElementById('passId').value;

  if(!code || !pass){
    showErr('Vui lòng nhập Admin ID và mật khẩu');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Đang xác thực...';
  clearErr();

  try {
    await window.api.loginByCode(code, pass);
    btn.classList.add('success');
    btn.innerHTML = '&#10003; Đăng nhập thành công';
    setTimeout(() => window.location.href = 'admin.html', 600);
  } catch(e) {
    handleLoginError(e, btn, 'Đăng nhập bằng ID');
  }
}

// ── Login by Email ──
async function doLoginEmail(){
  const btn = document.getElementById('btnEmail');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('passEmail').value;

  if(!email || !pass){
    showErr('Vui lòng nhập Email và mật khẩu');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Đang xác thực...';
  clearErr();

  try {
    await window.api.login(email, pass);
    btn.classList.add('success');
    btn.innerHTML = '&#10003; Đăng nhập thành công';
    setTimeout(() => window.location.href = 'admin.html', 600);
  } catch(e) {
    handleLoginError(e, btn, 'Đăng nhập bằng Email');
  }
}

function handleLoginError(e, btn, label){
  const msg = e.message === 'Invalid credentials'
    ? 'Thông tin đăng nhập không đúng'
    : (e.message || 'Lỗi kết nối — kiểm tra API server');
  showErr(msg);
  btn.disabled = false;
  btn.classList.remove('success');
  btn.innerHTML = '<svg style="width:16px;height:16px;fill:none;stroke:#000;stroke-width:2;stroke-linecap:round;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>' + label;
}

function showErr(msg){
  const el = document.getElementById('err');
  document.getElementById('errMsg').textContent = msg;
  el.classList.add('show');
}

function clearErr(){
  document.getElementById('err').classList.remove('show');
}

// Auto-focus first field
document.getElementById('staffCode').focus();
</script>
</body>
</html>
