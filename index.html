<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ANIMA Care Global — Coming Soon</title>
<meta name="description" content="ANIMA Care Global · Trang chủ đang được cập nhật. Vui lòng quay lại sau.">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Times New Roman',Times,serif;
  background:#03060F;
  color:#F0EEE8;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  overflow-x:hidden;
}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:rgba(34,197,94,.15);top:-10%;left:-10%}
.o2{width:400px;height:400px;background:rgba(168,85,247,.18);top:50%;right:-10%}
.o3{width:450px;height:450px;background:rgba(6,182,212,.12);bottom:-10%;left:30%}

.wrap{
  position:relative;
  z-index:1;
  text-align:center;
  max-width:720px;
}
.logo{
  width:80px;
  height:80px;
  margin:0 auto 32px;
  border-radius:20px;
  background:linear-gradient(135deg,#22c55e,#06b6d4,#a855f7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Montserrat',sans-serif;
  font-size:38px;
  font-weight:800;
  color:#03060F;
  box-shadow:0 20px 60px rgba(201,168,76,.25);
}
.tag{
  display:inline-block;
  font-family:'Montserrat',sans-serif;
  font-size:11px;
  font-weight:600;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#E8C96A;
  background:rgba(201,168,76,.1);
  border:1px solid rgba(201,168,76,.3);
  border-radius:100px;
  padding:8px 18px;
  margin-bottom:28px;
}
h1{
  font-size:clamp(36px,6vw,72px);
  font-weight:700;
  line-height:1.15;
  margin-bottom:20px;
  color:#F0EEE8;
}
h1 em{
  color:#E8C96A;
  font-style:italic;
  font-weight:400;
}
p{
  font-family:'Montserrat',sans-serif;
  font-size:15px;
  line-height:1.8;
  color:rgba(240,238,232,.7);
  max-width:520px;
  margin:0 auto 36px;
}
.footer{
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  color:rgba(240,238,232,.35);
  margin-top:48px;
}
.footer a{color:#E8C96A;text-decoration:none;margin:0 6px}
.footer a:hover{text-decoration:underline}

.dot{
  display:inline-block;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  margin-right:6px;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(1.3)}
}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

<main class="wrap">
  <div class="logo">A</div>
  <div class="tag"><span class="dot"></span> Coming Soon · Đang Cập Nhật</div>
  <h1>ANIMA Care <em>Global</em></h1>
  <p>Trang chủ của chúng tôi đang được thiết kế lại hoàn toàn để mang đến trải nghiệm tốt hơn. Vui lòng quay lại trong thời gian sớm nhất.</p>
  <div class="footer">
    Công ty Cổ phần ANIMA Care Global · 286 Nguyễn Xiển, Hà Nội<br>
    <a href="mailto:contact@animacare.global">contact@animacare.global</a> ·
    <a href="tel:+84913156676">+84 913 156 676</a>
  </div>
</main>
</body>
</html>
