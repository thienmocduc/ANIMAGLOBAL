version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: animacare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-animacare}
      POSTGRES_USER: ${POSTGRES_USER:-animacare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    networks:
      - animacare_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-animacare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: animacare_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    ports:
      - "6379:6379"
    networks:
      - animacare_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: animacare_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-animacare}:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/${POSTGRES_DB:-animacare}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_SECRET_MIN_32_CHARS_!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-CHANGE_REFRESH_SECRET_32_CHARS!!}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BCRYPT_ROUNDS: 12
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - animacare_net

  nginx:
    image: nginx:1.25-alpine
    container_name: animacare_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - animacare_net

volumes:
  postgres_data:

networks:
  animacare_net:
    driver: bridge
