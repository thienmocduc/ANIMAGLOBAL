name: AnimaCare Admin CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/animacare-api

jobs:
  # ── Lint & Test ─────────────────────────────────────────
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       animacare_test
          POSTGRES_USER:     animacare
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://animacare:testpassword@localhost:5432/animacare_test
        run: |
          node -e "
            const { Pool } = require('pg');
            const fs = require('fs');
            const pool = new Pool({ connectionString: process.env.DATABASE_URL });
            const sql = fs.readFileSync('src/db/init.sql','utf8');
            pool.query(sql).then(() => { console.log('Migration OK'); pool.end(); });
          "

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://animacare:testpassword@localhost:5432/animacare_test
          JWT_SECRET:         test_jwt_secret_32_chars_minimum!!
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_min!
          BCRYPT_ROUNDS:      4
        run: npm test --if-present

      - name: Syntax check all route files
        working-directory: backend
        run: |
          for f in src/**/*.js src/*.js; do
            node --check "$f" && echo "✅ $f" || exit 1
          done

  # ── Build & Push Docker image ────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy nginx + docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.yml,nginx/"
          target:   "/opt/animacare"

      - name: Copy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "frontend/"
          target:   "/opt/animacare"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/animacare

            # Pull latest image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.image }}

            # Update backend image tag in compose
            export BACKEND_IMAGE="${{ needs.build.outputs.image }}"
            sed -i "s|build:.*|image: $BACKEND_IMAGE|" docker-compose.yml

            # Rolling restart (zero downtime)
            docker-compose up -d --no-deps --build backend
            docker-compose up -d nginx

            # Health check
            sleep 15
            curl -sf http://localhost:4000/health || (docker-compose logs backend --tail=50 && exit 1)

            # Cleanup old images
            docker image prune -f

            echo "✅ Deploy complete"

      - name: Notify Slack (optional)
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} AnimaCare deploy *${{ job.status }}* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
